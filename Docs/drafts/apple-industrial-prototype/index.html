<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>齿轮箱测试系统 - Apple Industrial Draft</title>
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body>
  <svg width="0" height="0" style="position:absolute;visibility:hidden" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="icon-grid" viewBox="0 0 20 20">
        <rect x="3" y="3" width="5" height="5" rx="1.2"></rect>
        <rect x="12" y="3" width="5" height="5" rx="1.2"></rect>
        <rect x="3" y="12" width="5" height="5" rx="1.2"></rect>
        <rect x="12" y="12" width="5" height="5" rx="1.2"></rect>
      </symbol>
      <symbol id="icon-list" viewBox="0 0 20 20">
        <path d="M5 5h10"></path>
        <path d="M5 10h10"></path>
        <path d="M5 15h10"></path>
        <circle cx="3" cy="5" r="1"></circle>
        <circle cx="3" cy="10" r="1"></circle>
        <circle cx="3" cy="15" r="1"></circle>
      </symbol>
      <symbol id="icon-trend" viewBox="0 0 20 20">
        <path d="M3 14l4-4 3 2 6-7"></path>
        <path d="M13 5h3v3"></path>
      </symbol>
      <symbol id="icon-doc" viewBox="0 0 20 20">
        <path d="M6 2h6l4 4v12H6z"></path>
        <path d="M12 2v4h4"></path>
        <path d="M8 10h6"></path>
        <path d="M8 13h6"></path>
      </symbol>
      <symbol id="icon-gauge" viewBox="0 0 20 20">
        <path d="M4 13a6 6 0 1112 0"></path>
        <path d="M10 10l4-3"></path>
        <circle cx="10" cy="10" r="1.4"></circle>
      </symbol>
      <symbol id="icon-chevron" viewBox="0 0 20 20">
        <path d="M12 5l-5 5 5 5"></path>
      </symbol>
      <symbol id="icon-play" viewBox="0 0 20 20">
        <path d="M6 4l10 6-10 6z"></path>
      </symbol>
      <symbol id="icon-stop" viewBox="0 0 20 20">
        <rect x="5" y="5" width="10" height="10" rx="2"></rect>
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 20 20">
        <rect x="6" y="6" width="10" height="11" rx="2"></rect>
        <path d="M4 13V5a2 2 0 012-2h8"></path>
      </symbol>
      <symbol id="icon-reset" viewBox="0 0 20 20">
        <path d="M4 10a6 6 0 101.8-4.3"></path>
        <path d="M4 4v4h4"></path>
      </symbol>
    </defs>
  </svg>

  <div class="draft-shell">
    <aside id="sidebar" class="sidebar" data-expanded="true">
      <div class="sidebar__brand">
        <div class="brand-mark">G</div>
        <div class="brand-copy">
          <strong>齿轮箱测试系统</strong>
          <span>执行草稿</span>
        </div>
      </div>

      <button id="sidebarToggle" class="sidebar__toggle" type="button" aria-label="切换导航">
        <svg><use href="#icon-chevron"></use></svg>
        <span>导航</span>
      </button>

      <nav id="navList" class="sidebar__nav" aria-label="页面导航"></nav>
    </aside>

    <main class="workspace">
      <header class="toolbar">
        <div class="toolbar__context">
          <div>
            <h1 id="pageTitle">测试执行</h1>
            <p id="pageSubtitle">工业测试工具草稿 · Apple restraint</p>
          </div>
        </div>

        <div id="toolbarControls" class="toolbar__controls">
          <label class="field">
            <span>型号</span>
            <select id="modelSelect">
              <option>GBX-42A</option>
              <option>GBX-42B</option>
              <option>GBX-56A</option>
            </select>
          </label>

          <label class="field field--wide">
            <span>SN</span>
            <input id="serialInput" type="text" value="GBX42A-20260415-001">
          </label>

          <label class="field field--compact">
            <span>回差补偿</span>
            <input id="backlashInput" type="number" step="0.1" value="1.2">
            <em>°</em>
          </label>
        </div>

        <div class="toolbar__status">
          <div class="pill pill--accent">工位 #03</div>
          <div class="status-inline"><i></i><span>CAN 在线</span></div>
          <button id="startButton" class="btn btn--primary" type="button">
            <svg><use href="#icon-play"></use></svg>
            <span>开始测试</span>
          </button>
          <button id="stopButton" class="btn btn--danger" type="button" disabled>
            <svg><use href="#icon-stop"></use></svg>
            <span>急停</span>
          </button>
        </div>
      </header>

      <div class="surface">
        <section id="executionPage" class="page page--active">
          <div class="test-grid">
            <section class="flow-panel card">
              <div class="section-heading">
                <h2>测试流程</h2>
                <span id="flowStatusText">待机</span>
              </div>
              <div id="flowList" class="flow-list"></div>
              <div class="flow-footer">
                <span>总耗时</span>
                <strong id="elapsedTotal">00:00.0</strong>
              </div>
            </section>

            <section class="primary-panel">
              <div class="metrics-stack">
                <div id="heroMetrics" class="metrics-grid metrics-grid--hero"></div>
                <div id="detailMetrics" class="metrics-grid metrics-grid--detail"></div>
              </div>

              <section class="card detail-card">
                <div class="section-heading">
                  <h2 id="detailTitle">当前阶段明细</h2>
                  <span id="detailMeta">准备/找零</span>
                </div>
                <div id="detailContent" class="detail-content"></div>
              </section>

              <section class="card chart-card">
                <div class="section-heading section-heading--tight">
                  <h2>实时波形</h2>
                  <div id="chartToggles" class="chart-toggles"></div>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartCanvas"></canvas>
                  <div id="chartEmpty" class="chart-empty">开始测试后显示趋势线与阶段波动。</div>
                </div>
              </section>
            </section>

            <aside class="inspector-panel">
              <section class="card verdict-card">
                <div class="section-heading section-heading--tight">
                  <h2>整机结论</h2>
                </div>
                <div id="verdictBadge" class="verdict-badge verdict-badge--pending">待测试</div>
                <div class="verdict-meta">
                  <span id="verdictStage">等待开始</span>
                  <strong id="verdictElapsed">00:00.0</strong>
                </div>
              </section>

              <section class="card summary-card">
                <div class="section-heading section-heading--tight">
                  <h2>实时判据</h2>
                </div>
                <div id="summaryList" class="summary-list"></div>
              </section>

              <section class="card device-card">
                <div class="section-heading section-heading--tight">
                  <h2>设备状态</h2>
                </div>
                <div id="deviceList" class="device-list"></div>
              </section>

              <section class="card action-card">
                <button id="copyButton" class="btn btn--secondary btn--block" type="button">
                  <svg><use href="#icon-copy"></use></svg>
                  <span>复制报告</span>
                </button>
                <button id="resetButton" class="btn btn--secondary btn--block" type="button">
                  <svg><use href="#icon-reset"></use></svg>
                  <span>重置测试</span>
                </button>
              </section>
            </aside>
          </div>
        </section>

        <section id="placeholderPage" class="page page--placeholder" hidden>
          <div class="placeholder card">
            <div class="pill pill--accent" id="placeholderTag">RECIPE</div>
            <h2 id="placeholderTitle">配方管理</h2>
            <p id="placeholderDescription"></p>
            <div class="placeholder-note">这个区域故意保持轻量，只承载导航切换，不抢测试执行页的主视觉。</div>
          </div>
        </section>
      </div>

      <div id="alertBar" class="alert-bar" hidden></div>

      <footer class="statusbar">
        <div id="heartbeatList" class="heartbeat-list"></div>
        <span id="clockText" class="statusbar__clock"></span>
      </footer>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
